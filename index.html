<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BotRix Arena — Real Points System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e1a 0%, #12162c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(15, 20, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(88, 130, 255, 0.15);
        }

        .login-wall {
            background: rgba(8, 12, 25, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(145, 180, 255, 0.3);
        }

        .twitch-btn {
            background: #9146ff;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #5a2bbf;
            margin-top: 1.2rem;
        }

        .twitch-btn:hover {
            transform: translateY(-2px);
            background: #a05eff;
            box-shadow: 0 8px 0 #5a2bbf;
        }

        .login-status {
            margin-top: 1.5rem;
            color: #b9c3ff;
            font-weight: 500;
        }

        .dashboard {
            display: none;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem 1.8rem;
            border-radius: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(145, 180, 255, 0.3);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2a2f4b;
            object-fit: cover;
            border: 2px solid #9146ff;
        }

        .username {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f0f3ff;
        }

        .points-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            border-left: 4px solid #ffb347;
        }

        .points-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #cddcff;
        }

        .points-value {
            font-size: 2rem;
            font-weight: 800;
            color: #ffd966;
        }

        .logout-btn {
            background: rgba(255, 70, 85, 0.2);
            border: 1px solid #ff5e7a;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #ffb3be;
            cursor: pointer;
            font-weight: 600;
        }

        .pools-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 1.5rem 0 1rem 0;
            color: #e2eaff;
        }

        .pools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 0.8rem;
        }

        .pool-card {
            background: rgba(25, 32, 55, 0.8);
            border-radius: 1.8rem;
            padding: 1.5rem;
            border: 1px solid rgba(145, 180, 255, 0.25);
            transition: transform 0.2s;
        }

        .pool-card:hover {
            transform: translateY(-5px);
            border-color: #9146ff80;
        }

        .pool-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: white;
        }

        .pool-description {
            color: #a9b6e0;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .pool-cost {
            background: #1e293b;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            color: #ffd966;
            margin: 0.5rem 0;
        }

        .entry-status {
            font-size: 0.8rem;
            margin: 0.6rem 0;
            color: #94a3d8;
        }

        .enter-btn {
            width: 100%;
            background: #2d3748;
            border: none;
            padding: 0.75rem;
            border-radius: 2rem;
            font-weight: bold;
            color: #e2e8ff;
            margin-top: 0.8rem;
            cursor: pointer;
            font-size: 1rem;
        }

        .enter-btn:enabled {
            background: #9146ff;
            color: white;
        }

        .enter-btn:enabled:hover {
            background: #a259ff;
        }

        .enter-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #3a3f5e;
        }

        .message-area {
            margin-top: 2rem;
            background: #0b0f1c;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            color: #bfcbff;
            border-left: 4px solid #9146ff;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 2rem;
        }

        @media (max-width: 680px) {
            .user-header {
                flex-direction: column;
                align-items: stretch;
            }
            .points-value {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- LOGIN WALL -->
    <div id="loginWall" class="login-wall">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">🎮</div>
        <h2 style="color: white; margin-bottom: 0.5rem;">BotRix Arena</h2>
        <p style="color: #b9c3ff; max-width: 380px; margin: 0 auto 1rem auto;">Connect your Twitch account to access your REAL BotRix points</p>
        <button id="twitchLoginBtn" class="twitch-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="white">
                <path d="M11.571 4.714h1.715v5.143h-1.715V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L2.571 3.429v17.142h4.286V24l3.429-3.429h3.429L21.429 12V0H6zm13.714 11.143L16.286 15H12L9 18V15H5.143V2.571h14.571v8.572z"/>
            </svg>
            LOGIN WITH TWITCH
        </button>
        <div id="loginMessage" class="login-status">🔒 Login to access your BotRix points</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="dashboard">
        <div class="user-header">
            <div class="user-info">
                <img id="userAvatar" class="avatar" src="">
                <div>
                    <div class="username" id="userDisplayName"></div>
                    <div style="font-size: 0.75rem; color:#8f9bb5;" id="userLogin"></div>
                </div>
            </div>
            <div class="points-card">
                <span class="points-label">🎲 BOTRIX POINTS</span>
                <span class="points-value" id="pointsAmount">0</span>
            </div>
            <button id="logoutBtn" class="logout-btn">🚪 Disconnect</button>
        </div>

        <div class="pools-title">🎯 ACTIVE POOLS</div>
        <div id="poolsContainer" class="pools-grid">
            <div class="loading">Loading pools...</div>
        </div>
        <div id="notificationMessage" class="message-area">
            💡 Welcome to BotRix! Your points are saved in our REAL database.
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 🔴 YOU MUST CHANGE THESE 2 VALUES BELOW 🔴
    // ============================================================
    
    // 1️⃣ YOUR RENDER.COM API URL (from your deployed backend)
    const API_BASE_URL = "https://botrix-api.onrender.com";  // <--- CHANGE THIS
    
    // 2️⃣ YOUR TWITCH CLIENT ID (from Twitch Developer Console)
    const TWITCH_CLIENT_ID = "dxswtl8r959ihaqh4p17vpjmb19nos";  // <--- CHANGE THIS
    
    // ============================================================
    // NOTHING ELSE NEEDS TO BE CHANGED
    // ============================================================
    
    // Get the base URL without any fragments or queries
    const getBaseUrl = () => {
        return window.location.href.split('?')[0].split('#')[0];
    };
    
    const REDIRECT_URI = "https://yosuketv.github.io/YosukeTV/";
    
    const AVAILABLE_POOLS = [
        { id: "pool_valo", name: "🔫 VALORANT SKINS POOL", description: "Win a random premium skin bundle", cost: 250 },
        { id: "pool_emote", name: "😎 EMOTE JACKPOT", description: "Custom animated emote", cost: 120 },
        { id: "pool_gift", name: "🎁 10x GIFTED SUBS", description: "10 Tier 1 gift subs", cost: 400 },
        { id: "pool_arcane", name: "⚡ BOTRIX MYSTERY BOX", description: "Random surprise", cost: 80 }
    ];
    
    let currentUser = null;
    
    // ============ API FUNCTIONS ============
    
    async function getUserPointsFromAPI(twitchId) {
        try {
            const response = await fetch(`${API_BASE_URL}/api/points/${twitchId}`);
            if (!response.ok) throw new Error("API error");
            const data = await response.json();
            return data.points;
        } catch (error) {
            console.error("Error fetching points:", error);
            return null;
        }
    }
    
    async function joinPoolAPI(twitchId, poolId, poolName, cost) {
        try {
            const response = await fetch(`${API_BASE_URL}/api/join-pool`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ twitchId, poolId, poolName, cost })
            });
            return await response.json();
        } catch (error) {
            console.error("Error joining pool:", error);
            return { success: false, message: "Network error" };
        }
    }
    
    async function getUserEntriesAPI(twitchId) {
        try {
            const response = await fetch(`${API_BASE_URL}/api/entries/${twitchId}`);
            const data = await response.json();
            return data.entries || [];
        } catch (error) {
            console.error("Error fetching entries:", error);
            return [];
        }
    }
    
    // ============ TWITCH AUTHENTICATION ============
    
    function getTwitchTokenFromUrl() {
        // Check both hash and query params (in case it's in query)
        let token = null;
        
        // Check URL hash (fragment)
        if (window.location.hash) {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            token = hashParams.get('access_token');
        }
        
        // Also check query params (some OAuth flows use this)
        if (!token && window.location.search) {
            const queryParams = new URLSearchParams(window.location.search);
            token = queryParams.get('access_token');
        }
        
        console.log("Token found:", token ? "Yes" : "No");
        return token;
    }
    
    async function fetchTwitchUser(accessToken) {
        const response = await fetch('https://api.twitch.tv/helix/users', {
            headers: {
                'Authorization': `Bearer ${accessToken}`,
                'Client-Id': TWITCH_CLIENT_ID
            }
        });
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Failed to fetch user: ${response.status} - ${errorText}`);
        }
        const data = await response.json();
        if (data.data && data.data.length) {
            return data.data[0];
        }
        throw new Error("No user data");
    }
    
    // ============ UI FUNCTIONS ============
    
    async function updateDashboard() {
        if (!currentUser) return;
        
        document.getElementById('poolsContainer').innerHTML = '<div class="loading">📡 Loading your points...</div>';
        
        const points = await getUserPointsFromAPI(currentUser.id);
        
        if (points !== null) {
            document.getElementById('pointsAmount').innerText = points;
            const entries = await getUserEntriesAPI(currentUser.id);
            const enteredPoolIds = entries.map(e => e.poolId);
            renderPools(points, enteredPoolIds);
        } else {
            document.getElementById('poolsContainer').innerHTML = `<div class="loading">⚠️ Cannot connect to API at: ${API_BASE_URL}<br>Make sure your backend is deployed!</div>`;
        }
    }
    
    function renderPools(currentPoints, enteredPoolIds) {
        const container = document.getElementById('poolsContainer');
        container.innerHTML = '';
        
        for (let pool of AVAILABLE_POOLS) {
            const alreadyEntered = enteredPoolIds.includes(pool.id);
            const canJoin = (!alreadyEntered && currentPoints >= pool.cost);
            
            const card = document.createElement('div');
            card.className = 'pool-card';
            card.innerHTML = `
                <div class="pool-name">${pool.name}</div>
                <div class="pool-description">${pool.description}</div>
                <div class="pool-cost">💰 ${pool.cost} points</div>
                <div class="entry-status">${alreadyEntered ? '✅ Already participated' : '⚡ Not entered yet'}</div>
                <button class="enter-btn" data-pool-id="${pool.id}" data-cost="${pool.cost}" ${!canJoin ? 'disabled' : ''}>
                    ${alreadyEntered ? 'ALREADY ENTERED' : (canJoin ? `SPEND ${pool.cost} POINTS` : 'NOT ENOUGH POINTS')}
                </button>
            `;
            container.appendChild(card);
        }
        
        document.querySelectorAll('.enter-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if (!currentUser) return;
                
                const poolId = btn.dataset.poolId;
                const cost = parseInt(btn.dataset.cost);
                const pool = AVAILABLE_POOLS.find(p => p.id === poolId);
                
                const msgDiv = document.getElementById('notificationMessage');
                msgDiv.innerHTML = '⏳ Processing...';
                
                const result = await joinPoolAPI(currentUser.id, poolId, pool.name, cost);
                
                if (result.success) {
                    msgDiv.innerHTML = `🎉 ${result.message} Remaining: ${result.newPoints} points.`;
                    await updateDashboard();
                } else {
                    msgDiv.innerHTML = `⚠️ ${result.message}`;
                }
            });
        });
    }
    
    async function onLoginSuccess(user) {
        console.log("Login successful for:", user.display_name);
        currentUser = user;
        
        // Hide login wall, show dashboard
        document.getElementById('loginWall').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        // Update user info
        document.getElementById('userDisplayName').innerText = user.display_name;
        document.getElementById('userLogin').innerText = `@${user.login}`;
        document.getElementById('userAvatar').src = user.profile_image_url || 'https://static-cdn.jtvnw.net/user-default-pictures-75305d54-c7cc-40d1-bb9c-91fbe85943bd-profile_image-300x300.png';
        
        // Load points
        await updateDashboard();
    }
    
    function logout() {
        console.log("Logging out");
        currentUser = null;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('loginWall').style.display = 'block';
        
        // Clear the URL hash to prevent auto-login on refresh
        if (window.location.hash) {
            window.history.replaceState(null, '', window.location.pathname);
        }
    }
    
    // ============ INITIALIZATION ============
    
    async function init() {
        console.log("BotRix initializing...");
        console.log("Current URL:", window.location.href);
        console.log("Redirect URI:", REDIRECT_URI);
        console.log("API URL:", API_BASE_URL);
        
        // Check for token in URL
        const token = getTwitchTokenFromUrl();
        
        if (token) {
            console.log("Token found, authenticating...");
            document.getElementById('loginMessage').innerHTML = '🔐 Authenticating...';
            
            try {
                const userData = await fetchTwitchUser(token);
                console.log("User data received:", userData.login);
                
                await onLoginSuccess({
                    id: userData.id,
                    login: userData.login,
                    display_name: userData.display_name,
                    profile_image_url: userData.profile_image_url
                });
                
                // Clean URL after successful login
                window.history.replaceState(null, '', window.location.pathname);
                
            } catch (err) {
                console.error("Auth error:", err);
                document.getElementById('loginMessage').innerHTML = `❌ Login failed: ${err.message}`;
            }
        } else {
            console.log("No token found, showing login screen");
            document.getElementById('loginWall').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }
        
        // Setup login button
        const loginBtn = document.getElementById('twitchLoginBtn');
        if (loginBtn) {
            loginBtn.onclick = () => {
                const authUrl = `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=user:read:email`;
                console.log("Redirecting to:", authUrl);
                window.location.href = authUrl;
            };
        }
        
        // Setup logout button
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.onclick = logout;
        }
    }
    
    // Start the app
    init();
</script>
</body>
</html>
