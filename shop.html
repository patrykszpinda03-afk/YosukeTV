<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Twitch Points - Yosuke's Gambling Addicts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e1a 0%, #12162c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .shop-container {
            max-width: 800px;
            width: 100%;
            background: rgba(15, 20, 35, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2rem;
            text-align: center;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #9146ff;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            z-index: 100;
        }

        .back-btn:hover {
            background: #a259ff;
            transform: translateY(-2px);
        }

        h1 {
            color: white;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .coming-soon {
            background: rgba(0,0,0,0.5);
            border-radius: 2rem;
            padding: 3rem;
            margin-top: 2rem;
        }

        .coming-soon h2 {
            color: #ffd966;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .coming-soon p {
            color: #a9b6e0;
            font-size: 1.1rem;
        }

        .emoji {
            font-size: 4rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">← Back to Game</a>

<div class="shop-container">
    <h1>💰 Buy Twitch Points 💰</h1>
    <div class="coming-soon">
        <div class="emoji">🛒</div>
        <h2>Coming Soon!</h2>
        <p>You will be able to purchase additional Twitch points here.</p>
        <p style="margin-top: 1rem; font-size: 0.9rem;">Check back later for updates!</p>
    </div>
</div>

</body>
</html>
